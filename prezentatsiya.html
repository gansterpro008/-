<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Презентация</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, sans-serif;
    background: #05070c;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }

  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 10% 30%, #0c1a3a 0%, transparent 55%),
      radial-gradient(ellipse at 90% 20%, #1a0b30 0%, transparent 45%),
      radial-gradient(ellipse at 50% 90%, #0a1f2e 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #0d1020 0%, transparent 70%),
      #05070c;
  }

  .bg .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(150px);
    will-change: transform;
  }

  .bg .orb:nth-child(1) {
    width: 800px; height: 800px;
    background: rgba(59,130,246,.06);
    top: -300px; right: -200px;
    animation: orbA 18s ease-in-out infinite alternate;
  }

  .bg .orb:nth-child(2) {
    width: 650px; height: 650px;
    background: rgba(236,72,153,.045);
    bottom: -250px; left: -200px;
    animation: orbB 15s ease-in-out infinite alternate-reverse;
  }

  .bg .orb:nth-child(3) {
    width: 450px; height: 450px;
    background: rgba(139,92,246,.035);
    top: 25%; left: 55%;
    animation: orbC 20s ease-in-out infinite alternate;
  }

  .bg .orb:nth-child(4) {
    width: 350px; height: 350px;
    background: rgba(14,165,233,.03);
    bottom: 15%; right: 15%;
    animation: orbA 13s ease-in-out infinite alternate-reverse;
  }

  .bg .orb:nth-child(5) {
    width: 250px; height: 250px;
    background: rgba(249,115,22,.02);
    top: 60%; left: 10%;
    animation: orbC 11s ease-in-out infinite alternate;
  }

  @keyframes orbA {
    0% { transform: translate(0, 0) scale(1); opacity: .4; }
    100% { transform: translate(60px, -70px) scale(1.25); opacity: .9; }
  }

  @keyframes orbB {
    0% { transform: translate(0, 0) scale(1); opacity: .3; }
    100% { transform: translate(-50px, 60px) scale(1.3); opacity: .8; }
  }

  @keyframes orbC {
    0% { transform: translate(0, 0) scale(1); opacity: .2; }
    100% { transform: translate(80px, 40px) scale(1.2); opacity: .6; }
  }

  .grid {
    position: fixed; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(59,130,246,.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.012) 1px, transparent 1px);
    background-size: 45px 45px;
    pointer-events: none;
  }

  .grid::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, #05070c 70%);
    pointer-events: none;
  }

  .stars {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }

  .star:nth-child(1)  { width:2px;height:2px;top:4%;left:8%;--d:3.2s;opacity:.3; }
  .star:nth-child(2)  { width:1px;height:1px;top:10%;left:35%;--d:4.1s;opacity:.4; }
  .star:nth-child(3)  { width:2px;height:2px;top:3%;left:65%;--d:2.6s;opacity:.2; }
  .star:nth-child(4)  { width:1px;height:1px;top:18%;left:22%;--d:5.2s;opacity:.5; }
  .star:nth-child(5)  { width:2px;height:2px;top:8%;left:88%;--d:3.8s;opacity:.25; }
  .star:nth-child(6)  { width:3px;height:3px;top:24%;left:50%;--d:4.7s;opacity:.15; }
  .star:nth-child(7)  { width:1px;height:1px;top:30%;left:5%;--d:3.1s;opacity:.35; }
  .star:nth-child(8)  { width:2px;height:2px;top:36%;left:78%;--d:2.9s;opacity:.2; }
  .star:nth-child(9)  { width:1px;height:1px;top:42%;left:15%;--d:5.6s;opacity:.4; }
  .star:nth-child(10) { width:2px;height:2px;top:48%;left:62%;--d:3.4s;opacity:.15; }
  .star:nth-child(11) { width:1px;height:1px;top:55%;left:42%;--d:4.3s;opacity:.3; }
  .star:nth-child(12) { width:2px;height:2px;top:60%;left:92%;--d:2.7s;opacity:.2; }
  .star:nth-child(13) { width:1px;height:1px;top:68%;left:28%;--d:4.9s;opacity:.35; }
  .star:nth-child(14) { width:2px;height:2px;top:74%;left:55%;--d:3.7s;opacity:.15; }
  .star:nth-child(15) { width:1px;height:1px;top:82%;left:10%;--d:5.3s;opacity:.25; }
  .star:nth-child(16) { width:2px;height:2px;top:88%;left:72%;--d:2.5s;opacity:.2; }
  .star:nth-child(17) { width:1px;height:1px;top:94%;left:45%;--d:4.5s;opacity:.3; }
  .star:nth-child(18) { width:3px;height:3px;top:15%;left:75%;--d:6s;opacity:.1; }

  @keyframes twinkle {
    0% { opacity: var(--o, .1); transform: scale(.8); }
    100% { opacity: var(--o2, .5); transform: scale(1.2); }
  }

  .geo {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .geo-shape {
    position: absolute;
    opacity: .03;
    animation: geoFloat 30s ease-in-out infinite alternate;
  }

  .geo-shape:nth-child(1) {
    top: 12%; left: 7%;
    width: 40px; height: 46px;
    background: #3b82f6;
    clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
    animation-duration: 25s;
  }

  .geo-shape:nth-child(2) {
    bottom: 20%; right: 10%;
    width: 50px; height: 44px;
    background: #ec4899;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    animation-duration: 20s;
    animation-delay: -5s;
  }

  .geo-shape:nth-child(3) {
    top: 45%; right: 5%;
    width: 24px; height: 24px;
    background: #8b5cf6;
    transform: rotate(45deg);
    animation-duration: 28s;
    animation-delay: -10s;
  }

  .geo-shape:nth-child(4) {
    top: 70%; left: 15%;
    width: 60px; height: 60px;
    border: 2px solid rgba(14,165,233,.15);
    border-radius: 50%;
    background: none;
    animation-duration: 22s;
    animation-delay: -15s;
  }

  .geo-shape:nth-child(5) {
    top: 25%; left: 80%;
    width: 36px; height: 36px;
    background: #f59e0b;
    clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
    animation-duration: 18s;
    animation-delay: -8s;
  }

  @keyframes geoFloat {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: .02; }
    25% { transform: translate(20px, -15px) rotate(90deg) scale(1.1); opacity: .04; }
    50% { transform: translate(-10px, 20px) rotate(180deg) scale(.9); opacity: .03; }
    75% { transform: translate(15px, 10px) rotate(270deg) scale(1.05); opacity: .05; }
    100% { transform: translate(-20px, -10px) rotate(360deg) scale(1); opacity: .02; }
  }

  .rings {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .ring-pulse {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,.03);
    animation: ringPulse 8s ease-out infinite;
  }

  .ring-pulse:nth-child(1) {
    width: 200px; height: 200px;
    top: 15%; right: 20%;
    animation-delay: -2s;
  }

  .ring-pulse:nth-child(2) {
    width: 300px; height: 300px;
    bottom: 10%; left: 10%;
    border-color: rgba(236,72,153,.02);
    animation-delay: -5s;
  }

  .ring-pulse:nth-child(3) {
    width: 150px; height: 150px;
    top: 60%; right: 30%;
    border-color: rgba(139,92,246,.025);
    animation-delay: -7s;
  }

  .ring-pulse:nth-child(4) {
    width: 250px; height: 250px;
    top: 5%; left: 30%;
    border-color: rgba(14,165,233,.02);
    animation-delay: -3.5s;
  }

  @keyframes ringPulse {
    0% { transform: scale(.8); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: .3; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .particles {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .part {
    position: absolute;
    border-radius: 50%;
    animation: rise linear infinite;
  }

  .part:nth-child(1)  { left:3%;  --du:20s; --dl:-2s; width:2px;height:2px;background:rgba(59,130,246,.15); }
  .part:nth-child(2)  { left:10%; --du:24s; --dl:-6s; width:3px;height:3px;background:rgba(139,92,246,.12); }
  .part:nth-child(3)  { left:17%; --du:18s; --dl:-3s; width:1px;height:1px;background:rgba(236,72,153,.1); }
  .part:nth-child(4)  { left:24%; --du:22s; --dl:-9s; width:2px;height:2px;background:rgba(59,130,246,.1); }
  .part:nth-child(5)  { left:31%; --du:16s; --dl:-5s; width:3px;height:3px;background:rgba(14,165,233,.08); }
  .part:nth-child(6)  { left:38%; --du:25s; --dl:-11s; width:1px;height:1px;background:rgba(139,92,246,.1); }
  .part:nth-child(7)  { left:45%; --du:19s; --dl:-4s; width:2px;height:2px;background:rgba(59,130,246,.12); }
  .part:nth-child(8)  { left:52%; --du:23s; --dl:-8s; width:1px;height:1px;background:rgba(236,72,153,.08); }
  .part:nth-child(9)  { left:59%; --du:17s; --dl:-1s; width:2px;height:2px;background:rgba(59,130,246,.1); }
  .part:nth-child(10) { left:66%; --du:26s; --dl:-12s; width:3px;height:3px;background:rgba(14,165,233,.06); }
  .part:nth-child(11) { left:73%; --du:21s; --dl:-7s; width:1px;height:1px;background:rgba(139,92,246,.08); }
  .part:nth-child(12) { left:80%; --du:15s; --dl:-10s; width:2px;height:2px;background:rgba(59,130,246,.1); }
  .part:nth-child(13) { left:87%; --du:27s; --dl:-2s; width:1px;height:1px;background:rgba(236,72,153,.06); }
  .part:nth-child(14) { left:94%; --du:14s; --dl:-8s; width:2px;height:2px;background:rgba(59,130,246,.08); }
  .part:nth-child(15) { left:48%; --du:28s; --dl:-14s; width:1px;height:1px;background:rgba(14,165,233,.06); }
  .part:nth-child(16) { left:22%; --du:13s; --dl:-4s; width:2px;height:2px;background:rgba(249,115,22,.06); }

  @keyframes rise {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(25px); opacity: 0; }
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: .015;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(255,255,255,.02) 2px, rgba(255,255,255,.02) 4px
    );
  }

  .noise {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: .008;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  .presentation {
    width: 100vw; height: 100vh;
    position: relative; z-index: 2;
    display: flex; justify-content: center; align-items: center;
  }

  .slide {
    position: absolute;
    width: 920px; height: 530px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .5s ease;
  }

  .slide.active { opacity: 1; pointer-events: auto; }

  .slide-card {
    position: absolute; inset: 0;
    border-radius: 0;
    background: linear-gradient(160deg, rgba(12,18,32,.7), rgba(7,11,20,.82));
    border: 1px solid rgba(59,130,246,.04);
    box-shadow:
      0 30px 80px -20px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.012);
    overflow: hidden;
  }

  .slide-card .edge-top {
    position: absolute;
    top: -1px; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,.05), transparent);
    pointer-events: none;
  }

  .slide-card .edge-bot {
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(236,72,153,.025), transparent);
    pointer-events: none;
  }

  .slide-card .border-grad {
    position: absolute; inset: 0;
    padding: 1px;
    border-radius: 0;
    background: linear-gradient(135deg,
      rgba(59,130,246,.05) 0%,
      transparent 18%,
      transparent 82%,
      rgba(236,72,153,.025) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .slide-card .glow-in {
    position: absolute; inset: 0;
    border-radius: 0;
    background:
      radial-gradient(ellipse at 88% 0%, rgba(59,130,246,.035) 0%, transparent 40%),
      radial-gradient(ellipse at 12% 100%, rgba(236,72,153,.025) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(139,92,246,.015) 0%, transparent 35%);
    pointer-events: none;
  }

  .corner {
    position: absolute; pointer-events: none;
  }

  .corner.tl { top:24px; left:24px; width:28px; height:28px; border-top:1.5px solid rgba(59,130,246,.06); border-left:1.5px solid rgba(59,130,246,.06); }
  .corner.tr { top:24px; right:24px; width:28px; height:28px; border-top:1.5px solid rgba(59,130,246,.04); border-right:1.5px solid rgba(59,130,246,.04); }
  .corner.bl { bottom:24px; left:24px; width:28px; height:28px; border-bottom:1.5px solid rgba(236,72,153,.035); border-left:1.5px solid rgba(236,72,153,.035); }
  .corner.br { bottom:24px; right:24px; width:28px; height:28px; border-bottom:1.5px solid rgba(236,72,153,.025); border-right:1.5px solid rgba(236,72,153,.025); }

  .dot-deco { position:absolute; width:3px; height:3px; border-radius:50%; pointer-events:none; }
  .dot-deco.d1 { top:24px; left:50%; transform:translateX(-50%); background:rgba(59,130,246,.03); }
  .dot-deco.d2 { bottom:24px; left:50%; transform:translateX(-50%); background:rgba(236,72,153,.025); }
  .dot-deco.d3 { top:50%; left:24px; transform:translateY(-50%); width:4px; height:4px; background:rgba(139,92,246,.02); }
  .dot-deco.d4 { top:50%; right:24px; transform:translateY(-50%); width:4px; height:4px; background:rgba(14,165,233,.02); }
  .dot-deco.d5 { top:32%; left:50%; transform:translateX(-50%); width:2px; height:2px; background:rgba(59,130,246,.015); }
  .dot-deco.d6 { bottom:32%; left:50%; transform:translateX(-50%); width:2px; height:2px; background:rgba(236,72,153,.015); }

  .deco-line { position:absolute; pointer-events:none; }
  .deco-line.h1 { top:56px; left:56px; right:56px; height:1px; background:linear-gradient(90deg, rgba(59,130,246,.025), transparent 55%); }
  .deco-line.h2 { bottom:56px; left:56px; right:56px; height:1px; background:linear-gradient(90deg, transparent 45%, rgba(236,72,153,.015)); }

  .diamond { position:absolute; width:5px; height:5px; border:1px solid rgba(59,130,246,.03); transform:rotate(45deg); pointer-events:none; }
  .diamond.dm1 { top:52px; right:56px; }
  .diamond.dm2 { bottom:52px; left:56px; border-color:rgba(236,72,153,.02); }

  .slide-inner {
    position: relative; z-index: 5;
    display: flex;
    height: 100%;
    justify-content: center;
    align-items: center;
  }

  .demo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .phone-frame {
    position: relative;
    width: 220px;
    height: 380px;
    border: 1.5px dashed rgba(59,130,246,.05);
    border-radius: 0;
    flex-shrink: 0;
    box-shadow: inset 0 0 40px rgba(59,130,246,.01);
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 4px;
    background: rgba(59,130,246,.035);
    border-radius: 0;
  }

  .phone-frame.large { width: 260px; height: 400px; }

  .nav {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; align-items: center; gap: 14px;
    padding: 4px 12px 4px 18px;
    border-radius: 0;
    background: rgba(7,11,20,.4);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(59,130,246,.02);
    box-shadow: 0 8px 30px rgba(0,0,0,.12);
  }

  .nav .i { font-size:11px; color:rgba(139,152,177,.07); min-width:22px; text-align:center; font-weight:500; }
  .nav .i .c { color:rgba(139,152,177,.16); }
  .nav .i .s { color:rgba(139,152,177,.035); }

  .nav .dots { display:flex; gap:4px; }

  .nav .dot { width:4px; height:4px; background:rgba(139,152,177,.02); cursor:pointer; transition:all .4s ease; }
  .nav .dot.active { background:linear-gradient(90deg,#3b82f6,#ec4899); width:20px; box-shadow:0 0 8px rgba(59,130,246,.08); }

  .nav button { width:26px; height:26px; border-radius:50%; border:none; background:rgba(59,130,246,.02); color:rgba(139,152,177,.08); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .nav button:hover { background:rgba(59,130,246,.04); color:rgba(139,152,177,.18); }
  .nav button:disabled { opacity:.04; cursor:default; background:transparent; }

  .progress {
    position: fixed; top: 0; left: 0;
    height: 2px; z-index: 20;
    background: linear-gradient(90deg, #3b82f6, #ec4899);
    transition: width .4s ease;
    box-shadow: 0 0 12px rgba(59,130,246,.08);
  }

  @media (max-width: 1000px) {
    .slide { width:94vw; height:auto; min-height:70vh; left:3vw; top:4vh; }
    .phone-frame { width:42%; height:auto; aspect-ratio:22/38; }
    .phone-frame.large { width:48%; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="orb"></div><div class="orb"></div>
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<div class="grid"></div>

<div class="stars">
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div>
</div>

<div class="geo">
  <div class="geo-shape"></div>
  <div class="geo-shape"></div>
  <div class="geo-shape"></div>
  <div class="geo-shape"></div>
  <div class="geo-shape"></div>
</div>

<div class="rings">
  <div class="ring-pulse"></div>
  <div class="ring-pulse"></div>
  <div class="ring-pulse"></div>
  <div class="ring-pulse"></div>
</div>

<div class="particles">
  <div class="part"></div><div class="part"></div><div class="part"></div>
  <div class="part"></div><div class="part"></div><div class="part"></div>
  <div class="part"></div><div class="part"></div><div class="part"></div>
  <div class="part"></div><div class="part"></div><div class="part"></div>
  <div class="part"></div><div class="part"></div><div class="part"></div>
  <div class="part"></div>
</div>

<div class="scanlines"></div>
<div class="noise"></div>

<div class="progress" id="progress" style="width:11.11%"></div>

<div class="presentation" id="presentation">

  <!-- 1: Пустой -->
  <div class="slide active" data-index="0">
    <div class="slide-card">
      <div class="edge-top"></div><div class="edge-bot"></div>
      <div class="border-grad"></div><div class="glow-in"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="dot-deco d1"></div><div class="dot-deco d2"></div>
      <div class="dot-deco d3"></div><div class="dot-deco d4"></div>
      <div class="dot-deco d5"></div><div class="dot-deco d6"></div>
      <div class="deco-line h1"></div><div class="deco-line h2"></div>
      <div class="diamond dm1"></div><div class="diamond dm2"></div>
    </div>
    <div class="slide-inner"></div>

<div class="nav">
  <button id="prevBtn" disabled>←</button>
  <span class="i"><span class="c" id="navCur">1</span><span class="s">/9</span></span>
  <div class="dots" id="dots"></div>
  <button id="nextBtn">→</button>
</div>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;
  let touchX = 0;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const navCur = document.getElementById('navCur');
  const dots = document.getElementById('dots');
  const progress = document.getElementById('progress');

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dots.appendChild(dot);
  });

  function goTo(idx) {
    if (idx < 0) idx = 0;
    if (idx >= total) idx = total - 1;
    if (idx === current) return;
    slides[current].classList.remove('active');
    current = idx;
    slides[current].classList.add('active');
    updateUI();
  }

  function updateUI() {
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
    navCur.textContent = current + 1;
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    progress.style.width = ((current + 1) / total * 100) + '%';
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowUp'].includes(e.key)) { e.preventDefault(); goTo(current - 1); }
    if (['ArrowRight','ArrowDown',' '].includes(e.key)) { e.preventDefault(); goTo(current + 1); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(total - 1); }
  });

  document.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchX;
    if (Math.abs(dx) > 50) goTo(current + (dx < 0 ? 1 : -1));
  });

  updateUI();
})();
</script>
